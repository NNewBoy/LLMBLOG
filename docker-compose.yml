services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - DB_PATH=app/data/app.db
      - UPLOAD_DIR=uploads
    volumes:
      - db-data:/app/app/data
      - uploads:/app/uploads
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    volumes:
      - uploads:/opt/llmblog/backend/uploads:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
  uploads:
