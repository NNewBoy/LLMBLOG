# LLMBLOG Nginx 生产配置
# 前端静态文件 → /var/www/llmblog
# 后端 FastAPI → 127.0.0.1:8000
# 上传文件 → /opt/llmblog/backend/uploads

server {
    listen 80;
    server_name _;

    # 图片上传限制（后端 MAX_SIZE = 5MB，留余量）
    client_max_body_size 6m;

    # ── Gzip 压缩 ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    root /var/www/llmblog;
    index index.html;

    # ── 安全响应头（对静态文件生效）──────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ── API 反代 → FastAPI ──────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        # 后端 SecurityHeadersMiddleware 已设置安全头，剥离避免重复
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Content-Security-Policy;
    }

    # ── 上传图片（Nginx 直出，性能优于反代）──────────
    location /uploads/ {
        alias /opt/llmblog/backend/uploads/;
        expires 30d;
        access_log off;
    }

    # ── SPA History 路由 fallback ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 带哈希的静态资源长缓存 ──────────────────────
    location ~* \.(js|css|woff2?|png|jpe?g|gif|ico|svg)$ {
        expires 30d;
        access_log off;
    }
}
